name: dbt_airbnb

profile: airbnb

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
clean-targets:
  - "target"
  - "dbt_packages"

#seeds:
  # Builds seeds into '<your_schema_name>_raw'
  #dbt_airbnb:
    #+schema: raw

models:
  dbt_airbnb:
    +materialized: view

    src:
      +materialized: ephemeral

    dim:
      +materialized: view

    fct:
      +materialized: table

    mart:
      +materialized: table

data_tests:
  +store_failures: true
  +schema: _tests_failures #store failed records in a the schema, use the SQL query generated to review the errors