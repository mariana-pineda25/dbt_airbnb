models:

  - name: dim_listings_cleansed
    description: "This is the dimension table for listings, containing cleansed and standardized data about Airbnb listings."
    data_tests: #Data test
      - minimum_row_count:
          arguments:
            min_row_count: 1000

    columns:

     - name: listing_id
       description: "Primary key for the listings"
       data_tests:
         - unique
         - not_null

     - name: host_id
       description: "Host ID, foreign key to dim_hosts_cleansed"
       data_tests:
         - not_null
         - relationships:
             arguments:
               to: ref('dim_hosts_cleansed')
               field: host_id

     - name: room_type
       description: "Type of room available for booking"
       data_tests:
         - accepted_values:
             arguments:
               values: ['Entire home/apt',
                        'Private room',
                        'Shared room',
                        'Hotel room']

     - name: minimum_nights
       description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
       data_tests:
         - positive_values

  - name: dim_hosts_cleansed

    versions:
      - v: 1
        defined_in: dim_hosts_cleansed
        deprecation_date: 2030-01-01
      - v: 2
        columns:
          - include: '*'
            exclude: [host_name]
          - name: host_full_name
            description: The name of the host (N/A if not available)
            data_type: string
            constraints:
              - type: not_null
    latest_version: 1

    description: "This is the dimension table for hosts"
    config:
      contract: # Catch data type changes or column name changes
        enforced: true
    constraints:
      - type: primary_key # Currently NOT enforced in SF as well as Primary Key Constraints
        columns: [host_id]

    columns:
      - name: host_id
        data_type: integer
        constraints:
          - type: not_null
        data_tests:
          - unique

      - name: host_name
        data_type: string
        constraints:
          - type: not_null # Removing the data_tests since constraints are defined

      - name: is_superhost
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values: ['t', 'f']

      - name: updated_at
        data_type: timestamp

      - name: created_at
        data_type: timestamp
 
  - name: dim_listings_w_hosts
    data_tests:
    - dbt_expectations.expect_table_row_count_to_equal_other_table:
        arguments:
          compare_model: source('dbt_airbnb', 'listings') #ref("src_listings")
          #group_by: [col1, col2] # (Optional)
          #compare_group_by: [col1, col2] # (Optional)
          #factor: 1 # (Optional)
          #row_condition: "id is not null" # (Optional)
          #compare_row_condition: "id is not null" # (Optional)
    columns:
      - name: price
        data_tests:
          - dbt_expectations.expect_column_quantile_values_to_be_between:
              arguments:
                quantile: .99
                min_value: 50 
                max_value: 500
                #group_by: [group_id, other_group_id, ...] # (Optional)
                #row_condition: "id is not null" # (Optional)
                #strictly: false # (Optional. Default is 'false'. Adds an 'or equal to' to the comparison operator for min/max)

          - dbt_expectations.expect_column_max_to_be_between:
              arguments:
                #min_value: 1 # (Optional)
                max_value: 10000
                #group_by: [group_id, other_group_id, ...] # (Optional)
                #row_condition: "id is not null" # (Optional)
                #strictly: false # (Optional. Default is 'false'. Adds an 'or equal to' to the comparison operator for min/max)
                config:
                  severity: warn
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: number

  - name: fct_reviews
    columns:
      - name: listing_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_listings_cleansed')
                field: listing_id

      - name: reviewer_name
        data_tests:
          - not_null

      - name: review_sentiment
        data_tests:
          - accepted_values:
              arguments:
                values: ['positive', 'neutral', 'negative']
