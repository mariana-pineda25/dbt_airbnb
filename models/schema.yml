models:
  - name: dim_listings_cleansed
    description: "This is the dimension table for listings, containing cleansed and standardized data about Airbnb listings."
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000

    columns:

     - name: listing_id
       description: "Primary key for the listings"
       data_tests:
         - unique
         - not_null

     - name: host_id
       description: "Host ID, foreign key to dim_hosts_cleansed"
       data_tests:
         - not_null
         - relationships:
             arguments:
               to: ref('dim_hosts_cleansed')
               field: host_id

     - name: room_type
       description: "Type of room available for booking"
       data_tests:
         - accepted_values:
             arguments:
               values: ['Entire home/apt',
                        'Private room',
                        'Shared room',
                        'Hotel room']

     - name: minimum_nights
       data_tests:
         - positive_values

  - name: dim_hosts_cleansed
    config:
      contract: # Catch data type changes or column name changes
        enforced: true
    constraints:
      - type: primary_key # Currently NOT enforced in SF as well as Primary Key Constraints
        columns: [host_id]

    columns:
      - name: host_id
        data_type: integer
        constraints:
          - type: not_null
        data_tests:
          - unique

      - name: host_name
        data_type: string
        constraints:
          - type: not_null # Removing the data_tests since constraints are defined

      - name: is_superhost
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values: ['t', 'f']

      - name: updated_at
        data_type: timestamp

      - name: created_at
        data_type: timestamp

  - name: fct_reviews
    columns:
      - name: listing_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_listings_cleansed')
                field: listing_id

      - name: reviewer_name
        data_tests:
          - not_null

      - name: review_sentiment
        data_tests:
          - accepted_values:
              arguments:
                values: ['positive', 'neutral', 'negative']
