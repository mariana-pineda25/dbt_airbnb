sources:
  - name: dbt_airbnb
    schema: raw
    tables:
      - name: listings
        identifier: raw_listings

      - name: hosts
        identifier: raw_hosts

      - name: reviews
        identifier: raw_reviews
        config:
          loaded_at_field: date
          freshness:
            warn_after: {count: 1, period: day} #freshness check will warn if the data is more than 1 hour old
            #error_after: {count: 24, period: hour} #freshness check will fail if the data is more than 24 hours old