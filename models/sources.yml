sources:
  - name: dbt_airbnb
    schema: raw
    tables:

      - name: listings
        identifier: raw_listings
        columns: #Test sources
          - name: room_type
            data_tests:
              - dbt_expectations.expect_column_distinct_count_to_equal:
                  arguments:
                    value: 4
                    #quote_values: true # (Optional. Default is 'true'.)
                    #group_by: [group_id, other_group_id, ...] # (Optional)
                    #row_condition: "id is not null" # (Optional)
          - name: price
            data_tests:
              - dbt_expectations.expect_column_values_to_match_regex:
                  arguments:
                    regex: "^\\\\$[0-9\\\\.]+$"
                    #row_condition: "id is not null" # (Optional)
                    #is_raw: True # (Optional)
                    #flags: i # (Optional)

      - name: hosts
        identifier: raw_hosts

      - name: reviews
        identifier: raw_reviews
        config:
          loaded_at_field: date
          freshness:
            warn_after: {count: 1, period: day} #freshness check will warn if the data is more than 1 hour old
            #error_after: {count: 24, period: hour} #freshness check will fail if the data is more than 24 hours old